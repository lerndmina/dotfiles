# DeepFilterNet neural noise-canceling source for the Elgato Wave:3.
#
# Loaded by the main PipeWire daemon (pipewire.conf.d), so it starts with
# PipeWire and survives reboots — no separate `pipewire -c filter-chain.conf`
# context or extra service needed.
#
# Chain: Wave:3 --> [DeepFilterNet LADSPA] --> "DeepFilter Noise Canceling Source"
# EasyEffects then takes that source as its input for GUI tweaking, and apps
# select the EasyEffects output as the final "Clean Mic".
#
# Tuning: "Attenuation Limit (dB)" is the strength knob. 100 = full strength,
# 18-24 = medium, 6-12 = light (leaves some ambience, sounds more natural).
context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "DeepFilter Noise Canceling Source"
            media.name       = "DeepFilter Noise Canceling Source"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = "DeepFilter Mono"
                        plugin = /usr/lib/ladspa/libdeep_filter_ladspa.so
                        label  = deep_filter_mono
                        control = {
                            "Attenuation Limit (dB)" 100
                            # Residual-noise post-filter: cuts leftover hiss/AC that
                            # survives the main pass. 0 = off, ~0.05 = aggressive but
                            # before "musical noise" warble sets in.
                            "Post Filter Beta" 0.05
                        }
                    }
                ]
            }
            audio.rate = 48000
            audio.position = [ FL ]
            capture.props = {
                node.name    = "effect_input.deepfilter"
                node.passive = true
                # Always pull from the Wave:3 specifically, regardless of default source.
                target.object = "alsa_input.usb-Elgato_Systems_Elgato_Wave_3_BS01K1A02804-00.mono-fallback"
            }
            playback.props = {
                node.name   = "effect_output.deepfilter"
                media.class = Audio/Source
            }
        }
    }
]
